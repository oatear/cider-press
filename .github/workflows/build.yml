name: Build WASM

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip1

      - name: Install WASI SDK
        run: |
          WASI_VERSION=32
          WASI_VERSION_FULL=${WASI_VERSION}.0
          wget -q https://github.com/WebAssembly/wasi-sdk/releases/download/wasi-sdk-${WASI_VERSION}/wasi-sdk-${WASI_VERSION_FULL}-x86_64-linux.tar.gz
          tar xf wasi-sdk-${WASI_VERSION_FULL}-x86_64-linux.tar.gz
          echo "WASI_SDK_PATH=$(pwd)/wasi-sdk-${WASI_VERSION_FULL}-x86_64-linux" >> $GITHUB_ENV

      - name: Install wasm-bindgen-cli
        run: cargo install wasm-bindgen-cli

      - name: Configure C cross-compilation
        run: |
          echo "CC_wasm32_wasip1=${{ env.WASI_SDK_PATH }}/bin/clang --sysroot=${{ env.WASI_SDK_PATH }}/share/wasi-sysroot" >> $GITHUB_ENV
          echo "AR_wasm32_wasip1=${{ env.WASI_SDK_PATH }}/bin/llvm-ar" >> $GITHUB_ENV
          echo "${{ env.WASI_SDK_PATH }}/bin" >> $GITHUB_PATH

      - name: Build and package
        run: ./build.sh

      - name: Upload .tgz artifact
        uses: actions/upload-artifact@v4
        with:
          name: cider-press-tgz
          path: "dist/*.tgz"
